<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>lintune.xyz — preview (dark)</title>
<link rel="icon" type="image/svg+xml" href="../favicon/favicon-dark.svg"/>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Geist', 'Inter', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
    background: #0e0f12;
    color: #fafaf7;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 20px;
  }
  .browser {
    width: 100%; max-width: 980px;
    background: #16181d;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.03) inset;
    border: 1px solid #262a31;
  }
  .bar {
    display: flex; align-items: center; gap: 8px;
    padding: 11px 14px;
    background: #1c1f25;
    border-bottom: 1px solid #262a31;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .url {
    margin-left: 14px;
    font-family: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: 12px; color: #888;
    background: #0e0f12;
    padding: 4px 12px; border-radius: 4px;
    border: 1px solid #262a31;
  }
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 36px;
    border-bottom: 1px solid #262a31;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand svg.mark { display: block; }
  .brand .wordmark {
    font-weight: 800; font-size: 26px; letter-spacing: -0.045em; color: #fafaf7;
    line-height: 1;
  }
  .menu {
    display: flex; align-items: center; gap: 26px;
    font-family: 'Geist Mono', ui-monospace, monospace; font-size: 12px;
    color: #888;
  }
  .menu a { color: inherit; text-decoration: none; }
  .menu a:hover { color: #fafaf7; }
  .menu .cta {
    background: #fafaf7; color: #0e0f12;
    padding: 7px 14px; border-radius: 4px;
  }
  .hero {
    padding: 88px 36px 72px;
  }
  .hero h1 {
    margin: 0;
    font-size: 56px; font-weight: 700; letter-spacing: -0.035em;
    line-height: 1.05; color: #fafaf7;
    max-width: 640px;
  }
  .hero h1 em {
    font-style: normal;
    color: #22c55e;
  }
  .hero .meta {
    margin-top: 28px;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 12px; color: #888;
    letter-spacing: 0.02em;
  }
  .hero .actions {
    margin-top: 40px;
    display: flex; gap: 12px;
  }
  .btn {
    font-family: 'Geist', sans-serif; font-size: 14px; font-weight: 500;
    padding: 12px 22px; border-radius: 6px;
    text-decoration: none; cursor: pointer;
    border: 1px solid transparent;
  }
  .btn-primary { background: #fafaf7; color: #0e0f12; }
  .btn-secondary { background: transparent; color: #fafaf7; border-color: #262a31; }
  .footer {
    padding: 22px 36px;
    border-top: 1px solid #262a31;
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px; color: #888;
    display: flex; justify-content: space-between;
  }
</style>
</head>
<body>
  <div class="browser">
    <div class="bar">
      <div class="dot" style="background:#ff5f57"></div>
      <div class="dot" style="background:#febc2e"></div>
      <div class="dot" style="background:#28c840"></div>
      <div class="url">lintune.xyz</div>
    </div>

    <div class="nav">
      <div class="brand">
        <svg class="mark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="36" height="36" fill="none" aria-label="Lintune mark">
          <rect x="14" y="10" width="14" height="12" fill="#fafaf7"/>
          <rect x="14" y="24" width="14" height="12" fill="#fafaf7"/>
          <rect x="14" y="38" width="14" height="12" fill="#fafaf7"/>
          <rect x="30" y="38" width="20" height="12" fill="#22c55e"/>
        </svg>
        <span class="wordmark">lintune</span>
      </div>
      <div class="menu">
        <a href="#">docs</a>
        <a href="#">github</a>
        <a href="#">install</a>
        <a href="#" class="cta">get started</a>
      </div>
    </div>

    <div class="hero">
      <h1>Self-hosted identity, mail, and storage. <em>One platform.</em></h1>
      <div class="meta">keycloak · mailcow · nextcloud · open source · MIT</div>
      <div class="actions">
        <a class="btn btn-primary" href="#">Install in 5 minutes</a>
        <a class="btn btn-secondary" href="#">Read the docs</a>
      </div>
    </div>

    <div class="footer">
      <span>© 2026 lintune</span>
      <span>v0.1 · self-hostable</span>
    </div>
  </div>
</body>
</html>
